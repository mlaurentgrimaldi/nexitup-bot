<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC NEXITUP — Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <img src="logo ac nexitup.png" alt="AC NEXITUP" />
    <h1>Assistant</h1>
  </header>

  <main>

    <div id="suggestions">

      <!-- TRANSPORTEURS -->
      <div class="categorie">

        <h2>📦 Assistance Transporteurs</h2>

        <div class="buttons-grid">

          <button class="suggestion"
            onclick="afficherReponse('chronopost', 'transporteurs-reponse')">
            📦 Contacter Chronopost
          </button>

          <button class="suggestion"
            onclick="afficherReponse('heppner', 'transporteurs-reponse')">
            🚚 Contacter Heppner
          </button>

          <button class="suggestion"
            onclick="afficherReponse('delais', 'transporteurs-reponse')">
            🗺️ Délais Heppner
          </button>

          <button class="suggestion"
            onclick="afficherReponse('services', 'transporteurs-reponse')">
            🛎️ SERVICES TRANSPORTS
          </button>

        </div>

        <div class="reponse-box" id="transporteurs-reponse"></div>

      </div>


      <!-- EXPORT -->
      <div class="categorie">

        <h2>📄 Export & Réglementation</h2>

        <div class="buttons-grid">

          <button class="suggestion"
            onclick="afficherReponse('incoterm', 'export-reponse')">
            📋 Quel Incoterm saisir ?
          </button>

          <button class="suggestion"
            onclick="afficherReponse('bdu', 'export-reponse')">
            🔐 BDU et licences export
          </button>

        </div>

        <div class="reponse-box" id="export-reponse"></div>

      </div>


      <!-- SAV -->
      <div class="categorie">

        <h2>🔍 Problème & Suivi</h2>

        <div class="buttons-grid">

          <button class="suggestion"
            onclick="afficherReponse('tracking', 'sav-reponse')">
            🔍 Tracking introuvable ?
          </button>

        </div>

        <div class="reponse-box" id="sav-reponse"></div>

      </div>


      <!-- OUTILS -->
      <div class="categorie">

        <h2>⚙️ Outils divers</h2>

        <div class="buttons-grid">

          <button class="suggestion"
            onclick="afficherReponse('groupage', 'outils-reponse')">
            📅 Groupages client Hebdo
          </button>

        </div>

        <div class="reponse-box" id="outils-reponse"></div>

      </div>

    </div>

  </main>

  <script src="bot.js"></script>

</body>
</html>
