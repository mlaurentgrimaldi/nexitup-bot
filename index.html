<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC NEXITUP — Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <img src="logo ac nexitup.png" alt="AC NEXITUP" />
    <h1>Assistant</h1>
  </header>

  <main>
<div id="suggestions">

  <div class="categorie">
    <h2>📦 Transporteurs</h2>

    <div class="buttons-grid">
      <button class="suggestion" onclick="afficherReponse('chronopost')">
        📦 Contacter Chronopost
      </button>

      <button class="suggestion" onclick="afficherReponse('heppner')">
        🚚 Contacter Heppner
      </button>

      <button class="suggestion" onclick="afficherReponse('delais')">
        🗺️ Délais Heppner
      </button>
    </div>
  </div>

  <div class="categorie">
    <h2>📄 Export & Douanes</h2>

    <div class="buttons-grid">
      <button class="suggestion" onclick="afficherReponse('incoterm')">
        📋 Quel Incoterm saisir ?
      </button>

      <button class="suggestion" onclick="afficherReponse('bdu')">
        🔐 BDU et licences export
      </button>
    </div>
  </div>

  <div class="categorie">
    <h2>🔍 SAV & Suivi</h2>

    <div class="buttons-grid">
      <button class="suggestion" onclick="afficherReponse('tracking')">
        🔍 Tracking introuvable ?
      </button>
    </div>
  </div>

  <div class="categorie">
    <h2>⚙️ Outils internes</h2>

    <div class="buttons-grid">
      <button class="suggestion" onclick="afficherReponse('groupage')">
        📅 Groupages client Hebdo
      </button>
    </div>
  </div>

</div>
<div id="reponse-box"></div>
  </main>

  <script src="bot.js"></script>
</body>
</html>
