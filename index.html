<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC NEXITUP — Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <img src="logo ac nexitup.png" alt="AC NEXITUP" />
    <h1>Assistant AC NEXITUP</h1>
  </header>

  <main>
    <div id="suggestions">
      <button class="suggestion" onclick="afficherReponse('chronopost')">📦 Contacter Chronopost</button>
      <button class="suggestion" onclick="afficherReponse('heppner')">🚚 Contacter Heppner</button>
      <button class="suggestion" onclick="afficherReponse('delais')">🗺️ Délais Heppner</button>
      <button class="suggestion" onclick="afficherReponse('incoterm')">📋 Quel Incoterm saisir ?</button>
      <button class="suggestion" onclick="afficherReponse('bdu')">🔐 BDU et licences export</button>
      <button class="suggestion" onclick="afficherReponse('tracking')">🔍 Tracking introuvable ?</button>
      <button class="suggestion" onclick="afficherReponse('groupage')">📅 Groupages client Hebdo</button>
    </div>

    <div id="reponse-box"></div>

    <div id="chat-libre">
      <p>❓ Autre question</p>
      <div id="chat-box"></div>
      <div id="input-area">
        <input type="text" id="user-input" placeholder="Tapez votre question..." />
        <button onclick="sendMessage()">Envoyer</button>
      </div>
    </div>
  </main>

  <script src="bot.js"></script>
</body>
</html>
